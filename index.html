<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShippingCloud</title>
    <!-- Same filled cloud as the in-app BrandCloud mark, full-bleed; the app repaints it live to the accent color -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='3.75 0.4 42.8 31.1'%3E%3Cpath d='M15 31h22a9 9 0 0 0 2.7-17.6A12.5 12.5 0 0 0 15.5 9 9.8 9.8 0 0 0 15 31Z' fill='%230086E0'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      /* One body font on every OS instead of the system default (SF on Mac,
         Segoe on Windows, Roboto on Android) — same app everywhere. */
      tailwind.config = { theme: { extend: { fontFamily: { sans: ["Inter","system-ui","sans-serif"] } } } };
    </script>
    <style>
      /* ── accent color: recolors the three brand blues everywhere ── */
      html[data-accent] .bg-\[\#0086E0\]{background-color:var(--acc)!important}
      html[data-accent] .text-\[\#0086E0\],html[data-accent] .text-\[\#006FBF\]{color:var(--acc)!important}
      html[data-accent] .border-\[\#0086E0\],html[data-accent] .border-\[\#33ABFF\]{border-color:var(--acc)!important}
      html[data-accent] .hover\:bg-\[\#0072BE\]:hover{background-color:var(--accD)!important}
      html[data-accent] .hover\:text-\[\#0086E0\]:hover{color:var(--acc)!important}
      html[data-accent] .focus\:border-\[\#0099FF\]:focus{border-color:var(--accL)!important}
      html[data-accent] .accent-\[\#0086E0\]{accent-color:var(--acc)!important}
      html[data-accent] .border-b-\[\#0086E0\]{border-bottom-color:var(--acc)!important}
      /* accent tints the required-field highlight (address cells + refs) */
      html[data-accent] .bg-\[\#E6F4FF\]{background-color:color-mix(in srgb,var(--acc) 12%,#fff)!important}
      html[data-accent] .border-\[\#99D6FF\]{border-color:color-mix(in srgb,var(--acc) 45%,#fff)!important}
      /* date inputs in the orders rail: no calendar glyph — type or click to edit */
      .sc-date-plain::-webkit-calendar-picker-indicator{display:none}
      /* ── booking confetti ── */
      .sc-conf{position:absolute;width:8px;height:13px;border-radius:2px;opacity:.95;will-change:transform}
      .sc-conf-fall{animation-name:scFall;animation-timing-function:cubic-bezier(.2,.6,.4,1);animation-fill-mode:forwards}
      .sc-conf-pop{animation-name:scPop;animation-timing-function:cubic-bezier(.15,.9,.3,1);animation-fill-mode:forwards}
      @keyframes scFall{to{transform:translate3d(var(--dx,0),105vh,0) rotate(740deg);opacity:.85}}
      @keyframes scPop{60%{opacity:1}to{transform:translate3d(var(--dx,0),var(--dy,120px),0) rotate(520deg);opacity:0}}
    </style>
    <style>
      /* Mobile: iOS Safari auto-zooms any input under 16px on focus. Bump form controls to 16px
         on small screens only — desktop rendering is untouched. */
      @media (max-width: 640px){
        input, select, textarea { font-size: 16px !important; }
        html, body { overflow-x: hidden; }
      }
    </style>
  </head>
  <body class="bg-neutral-950">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
