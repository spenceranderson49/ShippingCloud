# Build settings declared HERE so every Netlify site linked to this repo builds identically —
# no per-site UI configuration needed (this is what left the staging sites publishing the raw
# repo root, which renders as a black page, and skipping the functions deploy entirely).
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# ShippingCloud API pretty URLs — must come before the SPA catch-all.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — serve index.html for all app routes.
# (Function paths under /.netlify/functions/ are routed natively by Netlify
#  before redirects run, so no rule is needed for them.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
